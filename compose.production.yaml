name: reverie-stage

x-app-environment: &app-environment
  NODE_ENV: production
  APP_BASE_URL: ${PUBLIC_APP_URL:-https://reverieapp.ru}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-image-prodaction-assets}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "true"
  S3_MAX_IMAGE_BYTES: ${S3_MAX_IMAGE_BYTES:-15728640}
  BETTER_AUTH_URL: ${PUBLIC_APP_URL:-https://reverieapp.ru}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
  BETTER_AUTH_TRUSTED_ORIGINS: ${PUBLIC_TRUSTED_ORIGINS:-https://reverieapp.ru}
  AUTH_ALLOW_SIGN_UP: ${AUTH_ALLOW_SIGN_UP:-false}
  AUTH_REQUIRE_EMAIL_VERIFICATION: "false"
  EMAIL_TRANSPORT: disabled
  PROVIDER_CREDENTIALS_MASTER_KEY: ${PROVIDER_CREDENTIALS_MASTER_KEY:?PROVIDER_CREDENTIALS_MASTER_KEY is required}
  PROVIDER_CREDENTIALS_MASTER_KEY_VERSION: ${PROVIDER_CREDENTIALS_MASTER_KEY_VERSION:-v1}
  PROVIDER_CREDENTIALS_FINGERPRINT_KEY: ${PROVIDER_CREDENTIALS_FINGERPRINT_KEY:?PROVIDER_CREDENTIALS_FINGERPRINT_KEY is required}
  AI_PROVIDER_RUNTIME: ${AI_PROVIDER_RUNTIME:-openrouter}
  OPENROUTER_SITE_URL: ${PUBLIC_APP_URL:-https://reverieapp.ru}

services:
  postgres:
    image: postgres:16.10-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-image_prodaction}
      POSTGRES_USER: ${POSTGRES_USER:-reverie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    logging: &service-logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://127.0.0.1:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 640m
    cpus: 1.0
    logging: *service-logging

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-image-prodaction-assets}
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"
    mem_limit: 128m
    logging: *service-logging

  migrate:
    image: reverie-app:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    restart: "no"
    environment: *app-environment
    command:
      - npm
      - run
      - db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.0
    logging: *service-logging

  web:
    image: reverie-app:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    restart: unless-stopped
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider --quiet http://127.0.0.1:3000/api/health/ready
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    mem_limit: 896m
    cpus: 1.5
    logging: *service-logging

  worker:
    image: reverie-app:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    restart: unless-stopped
    command:
      - npm
      - run
      - worker
    environment:
      <<: *app-environment
      WORKER_READY_FILE: /tmp/reverie-generation-worker-ready
      WORKER_HEALTH_STALE_AFTER_MS: ${WORKER_HEALTH_STALE_AFTER_MS:-45000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/reverie-generation-worker-ready
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 20s
    mem_limit: 896m
    cpus: 1.5
    logging: *service-logging

  caddy:
    image: caddy:2.10.2-alpine
    container_name: reverie-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 160m
    cpus: 0.5
    logging: *service-logging

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
