name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.10-alpine3.22
        env:
          POSTGRES_DB: image_prodaction
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d image_prodaction"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/image_prodaction
      BETTER_AUTH_URL: http://localhost:3004
      BETTER_AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3004
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: image-prodaction-assets
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_MAX_IMAGE_BYTES: "15728640"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
      - run: npm ci
      - run: npm run db:check
      - run: npm run db:migrate
      - run: npm run db:migrate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
