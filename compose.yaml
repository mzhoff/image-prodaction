name: image-prodaction

services:
  postgres:
    image: postgres:16.10-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_prodaction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d image_prodaction"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        mc mb --ignore-existing local/image-prodaction-assets
        mc anonymous set none local/image-prodaction-assets

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8025/readyz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build: .
    restart: "no"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/image_prodaction
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:migrate"]

  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/image_prodaction
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
      SMTP_USER: reverie-local
      SMTP_PASSWORD: reverie-local-mailpit
      BETTER_AUTH_URL: http://localhost:3004
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3004
      OPENROUTER_SITE_URL: http://localhost:3004
      AI_PROVIDER_RUNTIME: ${AI_PROVIDER_RUNTIME:-}
      CI: ${CI:-false}
      FAKE_AI_PROVIDER_CREDENTIAL: ${FAKE_AI_PROVIDER_CREDENTIAL:-fake-valid-credential}
    ports:
      - "3004:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:3000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/image_prodaction
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
      OPENROUTER_SITE_URL: http://web:3000
      WORKER_READY_FILE: /tmp/reverie-generation-worker-ready
      AI_PROVIDER_RUNTIME: ${AI_PROVIDER_RUNTIME:-}
      CI: ${CI:-false}
      FAKE_AI_PROVIDER_CREDENTIAL: ${FAKE_AI_PROVIDER_CREDENTIAL:-fake-valid-credential}
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/reverie-generation-worker-ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
